name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate tag and project versions
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargoVersion = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version = "([^"]+)"$').Matches[0].Groups[1].Value

          $uniqueVersions = @(@($packageVersion, $tauriVersion, $cargoVersion) | Select-Object -Unique)
          $projectVersion = $uniqueVersions[0]

          if ($uniqueVersions.Count -ne 1) {
            throw "Version mismatch detected. package.json=$packageVersion, tauri.conf.json=$tauriVersion, Cargo.toml=$cargoVersion"
          }

          if ($projectVersion -ne $tagVersion) {
            throw "Release tag v$tagVersion does not match project version $projectVersion."
          }

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Install Pandoc and prepare sidecar
        shell: pwsh
        run: |
          choco install pandoc --yes --no-progress
          refreshenv
          $pandoc = (Get-Command pandoc -ErrorAction Stop).Source
          Copy-Item -LiteralPath $pandoc -Destination src-tauri/binaries/pandoc-x86_64-pc-windows-msvc.exe -Force
          Write-Host "Pandoc sidecar ready: $(Get-Item src-tauri/binaries/pandoc-x86_64-pc-windows-msvc.exe)"

      - name: Build Tauri app
        shell: pwsh
        run: npx tauri build

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
